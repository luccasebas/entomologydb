<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Species | BruchinDB</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../search-page/index.html">
        <img src="./icons/bruchindb-logo.png" alt="BruchinDB logo" class="brand-logo" />
        <span class="brand-name">BruchinDB</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="../search-page/index.html">Search</a>
        <a class="nav-link" href="../map-page/index.html">Map</a>
        <a class="nav-link" href="../loading-page/index.html">Learn</a>
        <a class="nav-link" href="../data-submission-page/index.html">Submit Data</a>
        <a class="nav-link" href="../about-page/index.html">About</a>
      </nav>
    </div>
  </header>

  <nav class="breadcrumbs" aria-label="Breadcrumb" style="visibility:hidden">
    <a href="./index.html">Search</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current" id="breadcrumb-species">Species</span>
  </nav>

  <main class="species-page">

    <div class="species-hero">
      <h1 class="species-title">Loading...</h1>
      <p class="species-subtitle"></p>
      <div class="view-toggle">
        <button type="button" id="viewToggle" class="view-toggle-btn">Switch to tabbed view</button>
      </div>
    </div>

    <nav class="tabs species-tabs" aria-label="Species sections" style="display:none;">
      <button class="tab-btn is-active" data-tab="taxon" aria-selected="true" role="tab">Taxonomy</button>
      <button class="tab-btn" data-tab="images" aria-selected="false" role="tab">Images</button>
      <button class="tab-btn" data-tab="specimens" aria-selected="false" role="tab">Specimens</button>
      <button class="tab-btn" data-tab="events" aria-selected="false" role="tab">Events</button>
      <button class="tab-btn" data-tab="map-panel" aria-selected="false" role="tab">Map</button>
    </nav>

    <!-- Two-column layout -->
    <div class="species-columns">

      <!-- Left column: taxonomy + map -->
      <div class="species-col-left">
        <div class="panel-card" id="taxon">
          <h2 class="panel-title">Taxonomic Information</h2>
          <div class="info-grid"></div>
        </div>

        <div class="panel-card" id="map-panel">
          <h2 class="panel-title">Locality Map</h2>
          <div id="species-map"></div>
          <p id="map-empty" style="display:none; color:#666; padding:20px;">No coordinates available for this species.</p>
        </div>
      </div>

      <!-- Right column: images + specimens -->
      <div class="species-col-right">
        <div class="panel-card" id="images">
          <h2 class="panel-title">Images</h2>
          <div class="image-grid"></div>
        </div>

        <div class="panel-card" id="specimens">
          <h2 class="panel-title">Specimens</h2>
          <div class="specimen-list" id="specimen-list"></div>
        </div>
      </div>

    </div>

    <div class="panel-card" id="hosts" style="margin-top:24px; display:none;">
      <h2 class="panel-title">Host Plants</h2>
      <div class="info-grid"></div>
    </div>

    <!-- Full-width section: events -->
    <div class="panel-card" id="events" style="margin-top:24px;">
      <h2 class="panel-title">Collection Events</h2>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Country</th>
              <th>Province</th>
              <th>Locality</th>
              <th>Elevation</th>
              <th>Coordinates</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </main>

  <script type="module" src="./species.js"></script>
</body>
</html>
