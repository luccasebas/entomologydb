<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search | BruchinDB</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- Top Nav Bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="../welcome-page/index.html">
        <img src="./icons/bruchindb-logo.png" alt="BruchinDB logo" class="brand-logo" />
        <span class="brand-name">BruchinDB</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link active" href="../search-page/index.html">Search</a>
        <a class="nav-link" href="../map-page/index.html">Map</a>
        <a class="nav-link" href="../loading-page/index.html">Learn</a>
        <a class="nav-link" href="../data-submission-page/index.html">Submit Data</a>
        <a class="nav-link" href="../about-page/index.html">About</a>
      </nav>
    </div>
  </header>

  <div class="search-layout" id="searchLayout">

    <!-- LEFT FILTER PANEL -->
    <aside class="filter-panel" id="filterPanel">
      <div class="filter-section">
        <div class="filter-title" data-section-toggle>
          Scientific Name
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <input type="text" id="sci-name-search" placeholder="Type to search..." autocomplete="off" />
          <div id="sci-name-suggestions" class="sci-name-suggestions"></div>
          <div class="chip-list" id="selectedChips"></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" data-section-toggle>
          Tribe
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <select id="filter-tribe">
            <option value="">Any tribe</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" data-section-toggle>
          Location
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <div class="location-group">
            <input type="text" id="filter-country" placeholder="Country..." autocomplete="off" />
            <div id="country-suggestions" class="autocomplete-suggestions"></div>
            <div id="country-chips" class="chip-list"></div>
          </div>
          <div class="location-group">
            <input type="text" id="province-input" placeholder="Province / State..." autocomplete="off" />
            <div id="province-suggestions" class="autocomplete-suggestions"></div>
            <div id="province-chips" class="chip-list"></div>
          </div>
          <div class="location-group">
            <input type="text" id="locality-input" placeholder="Locality..." autocomplete="off" />
            <div id="locality-suggestions" class="autocomplete-suggestions"></div>
            <div id="locality-chips" class="chip-list"></div>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" data-section-toggle>
          Host Plant
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <input type="text" placeholder="Enter host plant..." />
          <select>
            <option value="">Select family</option>
            <option>Fabaceae</option>
            <option>Poaceae</option>
            <option>Asteraceae</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" data-section-toggle>
          Image-Only Species
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <label class="checkbox-label">
            <span class="checkbox-text">Show only species with images</span>
            <span class="checkbox-box">
              <input type="checkbox" id="filter-images-only" />
            </span>
          </label>
        </div>
      </div>

      <div class="filter-actions">
        <button type="button" id="searchBtn" class="btn-primary">Search</button>
        <button type="button" id="resetBtn" class="btn-secondary">Reset</button>
      </div>

    </aside>


    <!-- MAIN VIEW -->
    <main class="main-view">

      <div class="view-toolbar">
        <button type="button" class="view-btn" id="filtersToggleBtn">Filters</button>

        <div class="sort-wrapper">
          <label for="sortSelect" class="sort-label">Sort:</label>
          <select id="sortSelect" class="sort-select">
            <option value="az">Name (A-Z)</option>
            <option value="za">Name (Z-A)</option>
            <option value="newest">Year (Newest)</option>
            <option value="oldest">Year (Oldest)</option>
          </select>
        </div>

        <span class="results-count" id="resultsCount"></span>
      </div>

      <!-- Banner shown when filtered from the map page -->
      <div class="filter-banner" id="filterBanner" style="display:none;"></div>

      <div class="results-panel">
        <div class="cards-grid">
          <!-- Cards rendered by search.js -->
        </div>
      </div>

    </main>

  </div>

  <script>
    // Section dropdown toggling (works for any element with data-section-toggle)
    document.querySelectorAll('[data-section-toggle]').forEach((title) => {
      title.addEventListener('click', () => {
        const content = title.nextElementSibling;
        const arrow = title.querySelector('.arrow');
        if (!content || !arrow) return;
        content.classList.toggle('open');
        arrow.classList.toggle('rotate');
      });
    });

    // Filter panel collapse toggle
    const filtersToggleBtn = document.getElementById('filtersToggleBtn');
    const searchLayout = document.getElementById('searchLayout');
    if (filtersToggleBtn && searchLayout) {
      filtersToggleBtn.addEventListener('click', () => {
        searchLayout.classList.toggle('filters-collapsed');
      });
    }
  </script>

  <script type="module" src="./search.js"></script>

</body>
</html>
