<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search | BruchinDB</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../map-page/style.css" />
</head>

<body>

  <div class="page-shell panel-open search-layout-mode">

    <!-- LEFT FILTER PANEL -->
    <aside class="filter-panel is-open" id="filterPanel">

      <div class="filter-header">
        <h2>Search</h2>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleSection(this)">
          Scientific Name
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <input type="text" id="sci-name-search" placeholder="Type to search..." autocomplete="off" />
          <div id="sci-name-suggestions" class="sci-name-suggestions"></div>
          <div class="chip-list" id="selectedChips"></div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleSection(this)">
          Tribe
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <select id="filter-tribe">
            <option value="">Any tribe</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleSection(this)">
        Location
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <div class="location-group">
            <input type="text" id="filter-country" placeholder="Country..." autocomplete="off" />
            <div id="country-suggestions" class="autocomplete-suggestions"></div>
            <div id="country-chips" class="chip-list"></div>
          </div>
          <div class="location-group">
            <input type="text" id="province-input" placeholder="Province / State..." autocomplete="off" />
            <div id="province-suggestions" class="autocomplete-suggestions"></div>
            <div id="province-chips" class="chip-list"></div>
          </div>
          <div class="location-group">
            <input type="text" id="locality-input" placeholder="Locality..." autocomplete="off" />
            <div id="locality-suggestions" class="autocomplete-suggestions"></div>
            <div id="locality-chips" class="chip-list"></div>
          </div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleSection(this)">
          Host Plant
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <input type="text" placeholder="Enter host plant..." />
          <select>
            <option value="">Select family</option>
            <option>Fabaceae</option>
            <option>Poaceae</option>
            <option>Asteraceae</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleSection(this)">
          Image-Only Species
          <span class="arrow">&#9662;</span>
        </div>
        <div class="filter-content">
          <label class="checkbox-label">
            <span class="checkbox-text">Show only species with images</span>
            <span class="checkbox-box">
              <input type="checkbox" id="filter-images-only" />
            </span>
          </label>
        </div>
      </div>

      <div class="filter-actions">
        <button type="button" id="searchBtn" class="btn-primary">Search</button>
        <button type="button" id="resetBtn" class="btn-secondary">Reset</button>
      </div>

    </aside>


    <!-- MAIN VIEW -->
    <main class="main-view">

      <div class="view-toolbar">
        <button class="view-btn" id="filtersBtn" type="button">Filters</button>
        <a class="view-btn secondary" href="../map-page/index.html">View Map</a>
        <span class="results-count" id="resultsCount"></span>
      </div>

      <!-- Banner shown when filtered from the map page -->
      <div class="filter-banner" id="filterBanner" style="display:none;"></div>

      <div class="results-panel">
        <div class="cards-grid">
          <!-- Cards rendered by search.js -->
        </div>
      </div>

    </main>

  </div>

  <script type="module" src="./search.js"></script>

  <script>
    const pageShell = document.querySelector(".page-shell");
    const filterPanel = document.getElementById("filterPanel");
    const filtersBtn = document.getElementById("filtersBtn");

    function setPanelState(open) {
      if (open) {
        pageShell.classList.remove("panel-closed");
        pageShell.classList.add("panel-open");
        filterPanel.classList.remove("is-closed");
        filterPanel.classList.add("is-open");
      } else {
        pageShell.classList.remove("panel-open");
        pageShell.classList.add("panel-closed");
        filterPanel.classList.remove("is-open");
        filterPanel.classList.add("is-closed");
      }
    }

    const mainView = document.querySelector(".main-view");

    function togglePanel() {
      const isClosed = pageShell.classList.contains("panel-closed");
      setPanelState(isClosed);
      if (window.map) window.map.resize();
    }

    function toggleSection(element) {
      const content = element.nextElementSibling;
      const arrow = element.querySelector(".arrow");
      if (!content || !arrow) return;
      content.classList.toggle("open");
      arrow.classList.toggle("rotate");
    }

    filtersBtn.addEventListener("click", togglePanel);
    setPanelState(true);

    mainView.addEventListener("transitionend", (e) => {
      if (e.propertyName === "left" && window.map) window.map.resize();
    });
  </script>

</body>
</html>
