    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function makeMixedSequence(images, repeatCount = 2) {
      const result = [];

      for (let r = 0; r < repeatCount; r++) {
        let shuffled = shuffleArray(images);

        if (result.length > 0 && shuffled[0] === result[result.length - 1]) {
          shuffled.push(shuffled.shift());
        }

        result.push(...shuffled);
      }

      return result;
    }

    function buildRow(rowId) {
      const row = document.getElementById(rowId);

      const mixedImages = makeMixedSequence(beetleImages, 2);

      mixedImages.forEach((src, index) => {
        const card = document.createElement("div");
        card.className = "mosaic-card";

        const sizeClasses = ["tile-wide", "tile-tall", "tile-medium", "tile-small"];
        card.classList.add(sizeClasses[index % sizeClasses.length]);

        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "lazy";

        card.appendChild(img);
        row.appendChild(card);
      });
    }

    buildRow("row-1");
    buildRow("row-2");
    buildRow("row-3");
    buildRow("row-4");
